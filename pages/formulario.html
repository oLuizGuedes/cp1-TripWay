<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <title>TripWay | Formulário</title>
</head>

<body>

    <nav>

        <a class="logo" href="../index.html">
            TripWay
        </a>

        <ul class="nav-links">
            <li><a class="nav-link" href="destinos.html">Destinos</a></li>
            <li><a class="nav-link" href="pacotes.html">Pacotes</a></li>
            <li><a class="nav-link" href="formulario.html">Formulário</a></li>
        </ul>

    </nav>

    <header class="page-header">

        <h1>Contato & Reservas</h1>

        <p>
            Preencha o formulário abaixo para solicitar sua viagem.
        </p>

    </header>

    <main>

        <section class="form-container">

            <form>

                <div class="form-group">

                    <label for="name">Nome</label>

                    <input 
                        type="text" 
                        id="name" 
                        placeholder="Ex: João Silva"
                    >

                </div>

                <div class="form-group">

                    <label for="email">Email</label>

                    <input 
                        type="email" 
                        id="email" 
                        placeholder="Ex: joao@gmail.com"
                    >

                </div>

                <div class="form-group">

                    <label for="destination">Destino</label>

                    <select id="destination">

                        <option>Toronto</option>
                        <option>Ottawa</option>
                        <option>Vancouver</option>
                        <option>Washington</option>

                    </select>

                </div>

                <div class="form-group">

                    <label for="date">Data da viagem</label>

                    <input 
                        type="date" 
                        id="date"
                    >

                </div>

                <div class="form-group">

                    <label for="people">
                        Quantidade de pessoas
                    </label>

                    <input 
                        type="number" 
                        id="people" 
                        placeholder="Ex: 2"
                    >

                </div>

                <div class="form-group">

                    <label for="message">Mensagem</label>

                    <textarea 
                        id="message"
                        placeholder="Digite sua mensagem aqui..."
                    ></textarea>

                </div>

                <button class="btn" type="submit">
                    Enviar Solicitação
                </button>

            </form>

        </section>

    </main>

</body>
</html>
